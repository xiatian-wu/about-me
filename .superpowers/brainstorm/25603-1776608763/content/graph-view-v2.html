<h2>Publication Graph View</h2>
<p class="subtitle">Published = green · In progress = yellow</p>

<div class="mockup" style="margin-bottom:1.5rem;">
  <div class="mockup-header">Research Page — Graph View</div>
  <div class="mockup-body" style="padding:1rem;">

    <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">

    </div>

    <div style="background:#0f172a;border-radius:8px;padding:1rem;height:320px;position:relative;overflow:hidden;">
      <svg width="100%" height="100%" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
        <!-- Edges -->
        <line x1="300" y1="150" x2="150" y2="80" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.5"/>
        <line x1="300" y1="150" x2="450" y2="80" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.5"/>
        <line x1="300" y1="150" x2="160" y2="220" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.5"/>
        <line x1="300" y1="150" x2="440" y2="220" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.5"/>
        <line x1="300" y1="150" x2="300" y2="40" stroke="#818cf8" stroke-width="1" stroke-opacity="0.4"/>
        <line x1="150" y1="80" x2="80" y2="140" stroke="#4ade80" stroke-width="1" stroke-opacity="0.4"/>
        <line x1="150" y1="80" x2="100" y2="50" stroke="#4ade80" stroke-width="1" stroke-opacity="0.4"/>
        <line x1="450" y1="80" x2="520" y2="130" stroke="#4ade80" stroke-width="1" stroke-opacity="0.4"/>
        <line x1="450" y1="80" x2="500" y2="50" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.4"/>
        <line x1="160" y1="220" x2="90" y2="260" stroke="#4ade80" stroke-width="1" stroke-opacity="0.4"/>
        <line x1="160" y1="220" x2="190" y2="270" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.4"/>
        <line x1="440" y1="220" x2="510" y2="260" stroke="#4ade80" stroke-width="1" stroke-opacity="0.4"/>
        <line x1="440" y1="220" x2="400" y2="270" stroke="#4ade80" stroke-width="1" stroke-opacity="0.4"/>

        <!-- Central node -->
        <circle cx="300" cy="150" r="18" fill="#6366f1" opacity="0.95"/>
        <text x="300" y="154" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif">You</text>

        <!-- Project nodes -->
        <circle cx="150" cy="80" r="13" fill="#818cf8" opacity="0.9"/>
        <text x="150" y="84" text-anchor="middle" fill="white" font-size="7.5" font-family="sans-serif">Project A</text>

        <circle cx="450" cy="80" r="13" fill="#818cf8" opacity="0.9"/>
        <text x="450" y="84" text-anchor="middle" fill="white" font-size="7.5" font-family="sans-serif">Project B</text>

        <circle cx="160" cy="220" r="13" fill="#818cf8" opacity="0.9"/>
        <text x="160" y="224" text-anchor="middle" fill="white" font-size="7.5" font-family="sans-serif">Project C</text>

        <circle cx="440" cy="220" r="13" fill="#818cf8" opacity="0.9"/>
        <text x="440" y="224" text-anchor="middle" fill="white" font-size="7.5" font-family="sans-serif">Project D</text>

        <!-- Keyword node -->
        <circle cx="300" cy="40" r="9" fill="#a5b4fc" opacity="0.8"/>
        <text x="300" y="43" text-anchor="middle" fill="#1e1b4b" font-size="6.5" font-family="sans-serif">ML</text>

        <!-- Published paper nodes — GREEN -->
        <circle cx="80" cy="140" r="7" fill="#4ade80" opacity="0.9"/>
        <text x="80" y="143" text-anchor="middle" fill="#14532d" font-size="5.5" font-family="sans-serif">Pub 1</text>

        <circle cx="100" cy="50" r="7" fill="#4ade80" opacity="0.9"/>

        <circle cx="520" cy="130" r="7" fill="#4ade80" opacity="0.9"/>
        <text x="520" y="133" text-anchor="middle" fill="#14532d" font-size="5.5" font-family="sans-serif">Pub 3</text>

        <circle cx="90" cy="260" r="7" fill="#4ade80" opacity="0.9"/>
        <text x="90" y="263" text-anchor="middle" fill="#14532d" font-size="5.5" font-family="sans-serif">Pub 4</text>

        <circle cx="510" cy="260" r="7" fill="#4ade80" opacity="0.9"/>
        <text x="510" y="263" text-anchor="middle" fill="#14532d" font-size="5.5" font-family="sans-serif">Pub 5</text>

        <circle cx="400" cy="270" r="7" fill="#4ade80" opacity="0.9"/>
        <text x="400" y="273" text-anchor="middle" fill="#14532d" font-size="5.5" font-family="sans-serif">Pub 6</text>

        <!-- In-progress nodes — YELLOW -->
        <circle cx="500" cy="50" r="7" fill="#fbbf24" opacity="0.9"/>
        <text x="500" y="53" text-anchor="middle" fill="#78350f" font-size="5.5" font-family="sans-serif">WIP</text>

        <circle cx="190" cy="270" r="7" fill="#fbbf24" opacity="0.9"/>
        <text x="190" y="273" text-anchor="middle" fill="#78350f" font-size="5.5" font-family="sans-serif">WIP</text>
      </svg>

      <!-- Legend -->
      <div style="position:absolute;bottom:12px;left:12px;display:flex;gap:1rem;font-size:0.7rem;color:#94a3b8;">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#6366f1;vertical-align:middle;margin-right:3px;"></span>You</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#818cf8;vertical-align:middle;margin-right:3px;"></span>Project</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#4ade80;vertical-align:middle;margin-right:3px;"></span>Published</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#fbbf24;vertical-align:middle;margin-right:3px;"></span>In progress</span>
      </div>
      <div style="position:absolute;top:10px;right:12px;font-size:0.65rem;color:#475569;font-style:italic;">hover → preview · click → open</div>
    </div>
  </div>
</div>

<div class="options">
  <div class="option" data-choice="looks-good" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>Looks good</h3>
      <p>Green for published, yellow for in progress</p>
    </div>
  </div>
  <div class="option" data-choice="more-changes" onclick="toggleSelect(this)">
    <div class="letter">✎</div>
    <div class="content">
      <h3>More changes</h3>
      <p>Tell me what else to adjust</p>
    </div>
  </div>
</div>
